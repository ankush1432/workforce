name: supervisor_app
description: Face Attendance Supervisor Mobile App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  dio: ^5.8.0+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3
  go_router: ^14.8.1
  google_mlkit_face_detection: ^0.12.0
  tflite_flutter: ^0.11.0
  camera: ^0.11.1
  geolocator: ^13.0.4
  connectivity_plus: ^6.1.4
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  flutter_animate: ^4.5.2
  permission_handler: ^11.4.0
  image: ^4.5.4
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/models/
    - assets/images/
